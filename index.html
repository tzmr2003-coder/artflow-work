<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artflow Enterprise Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #06b6d4; }
        body { background-color: var(--bg); color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .module { background: var(--card); border: 1px solid #334155; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; }
        .btn-main { background: var(--accent); color: #000; font-weight: 800; padding: 0.75rem; border-radius: 0.5rem; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); }
        .delete-btn { color: #f87171; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-4xl mx-auto">

    <header class="mb-8">
        <h1 class="text-4xl font-black text-cyan-400">Artflow Enterprise</h1>
        <p class="text-slate-400">מרכז שליטה ובקרה לניהול פרויקטים וכוח אדם</p>
    </header>

    <section class="module">
        <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">👷 ניהול נוכחות ודוחות</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <input id="worker-name" placeholder="שם העובד" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full">
            <div class="flex gap-2">
                <button onclick="attendance('כניסה')" class="flex-1 bg-green-600 rounded-lg font-bold">דיווח כניסה</button>
                <button onclick="attendance('יציאה')" class="flex-1 bg-red-600 rounded-lg font-bold">דיווח יציאה</button>
            </div>
        </div>
        <div id="attendance-log" class="space-y-2 max-h-60 overflow-y-auto"></div>
    </section>

    <section class="module">
        <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">📋 ניהול פרויקטים</h2>
        <div class="space-y-3 mb-6">
            <input id="job-client" placeholder="שם הלקוח" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full">
            <input id="job-address" placeholder="כתובת מדויקת (לוויז)" class="bg-slate-900 border border-slate-700 p-3 rounded-lg w-full">
            <button onclick="addJob()" class="w-full btn-main text-center block">הוסף פרויקט חדש למערכת</button>
        </div>
        <div id="jobs-log" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </section>

    <script>
        // חיבור לבסיס הנתונים
        const config = { databaseURL: "https://artflow-74b9c-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // פונקציית נוכחות מקצועית
        function attendance(type) {
            const name = document.getElementById('worker-name').value;
            if(!name) return alert("חובה להזין שם עובד");
            const now = new Date();
            db.ref('attendance').push({
                name, type, 
                timestamp: now.getTime(),
                date: now.toLocaleDateString(),
                time: now.toLocaleTimeString()
            });
            document.getElementById('worker-name').value = '';
        }

        // פונקציית הוספת פרויקט
        function addJob() {
            const client = document.getElementById('job-client').value;
            const address = document.getElementById('job-address').value;
            if(!client || !address) return alert("מלא את כל הפרטים");
            db.ref('jobs').push({ client, address, createdAt: Date.now() });
        }

        // האזנה ורינדור נוכחות (עם יכולת מחיקה)
        db.ref('attendance').on('value', (snap) => {
            const list = document.getElementById('attendance-log');
            list.innerHTML = '';
            const data = snap.val() || {};
            Object.keys(data).reverse().forEach(id => {
                list.innerHTML += `<div class="bg-slate-900 p-3 rounded-lg flex justify-between items-center text-sm">
                    <div><b>${data[id].name}</b> | ${data[id].type} | ${data[id].time}</div>
                    <span onclick="db.ref('attendance/${id}').remove()" class="delete-btn text-red-500">מחק</span>
                </div>`;
            });
        });

        // האזנה ורינדור פרויקטים (עם יכולת מחיקה וניווט)
        db.ref('jobs').on('value', (snap) => {
            const list = document.getElementById('jobs-log');
            list.innerHTML = '';
            const data = snap.val() || {};
            Object.keys(data).forEach(id => {
                const job = data[id];
                list.innerHTML += `<div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
                    <div class="font-bold text-lg mb-1">${job.client}</div>
                    <div class="text-xs text-slate-400 mb-3">${job.address}</div>
                    <div class="flex gap-2">
                        <button onclick="window.location.href='waze://?q='+encodeURIComponent('${job.address}')" class="flex-1 bg-cyan-900 p-2 rounded text-xs font-bold">נווט בוויז</button>
                        <button onclick="db.ref('jobs/${id}').remove()" class="p-2 bg-red-900 rounded text-xs font-bold">מחק</button>
                    </div>
                </div>`;
            });
        });
    </script>
</body>
</html>
