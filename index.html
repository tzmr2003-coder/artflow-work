<!DOCTYPE html>
<html lang="he" dir="rtl" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artflow Enterprise System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --gold: #C0843C; --dark: #0f172a; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .text-gold { color: var(--gold); }
        .bg-gold { background-color: var(--gold); }
        .border-gold { border-color: var(--gold); }
        body { font-family: sans-serif; }
    </style>
</head>
<body class="h-full text-slate-200">

    <div id="app" class="h-full flex flex-col max-w-lg mx-auto overflow-hidden shadow-2xl">
        <header class="p-6 glass-panel border-b border-gold/30 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-widest text-gold">ARTFLOW_CORE</h1>
            <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
        </header>

        <main id="main-content" class="flex-1 p-6 overflow-y-auto">
            <div class="flex items-center justify-center h-full text-slate-500">
                טוען מודולים ומערכות...
            </div>
        </main>

        <footer class="p-4 glass-panel border-t border-gold/30">
            <div class="text-center text-[10px] uppercase tracking-widest text-slate-500">
                Enterprise Management System v2.1
            </div>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="logic.js"></script>
    <script src="ui.js"></script>
    <script src="waze.js"></script>
</body>
</html>
