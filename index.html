<!DOCTYPE html>
<html lang="he" dir="rtl" class="h-full bg-[#0f172a]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artflow Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --gold: #C0843C; --silver: #94a3b8; --dark: #0f172a; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-border { border-color: var(--gold); }
        .text-gold { color: var(--gold); }
    </style>
</head>
<body class="h-full text-slate-200">

    <div id="app-root" class="h-full flex flex-col">
        <header class="p-6 flex justify-between items-center glass-panel">
            <h1 class="text-2xl font-bold tracking-widest text-gold">ARTFLOW_CORE</h1>
            <div id="status-indicator" class="w-3 h-3 rounded-full bg-green-500"></div>
        </header>

        <main id="main-content" class="flex-1 p-6 overflow-y-auto">
            </main>
    </div>

    <script src="config.js"></script>
    <script src="logic.js"></script>
    <script src="ui.js"></script>
</body>
</html>
